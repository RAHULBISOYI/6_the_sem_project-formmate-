<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* Basic reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

  /* Container styling */
#imagefill {
  width: 100%;           /* full width of parent */
  max-width: 800px;      /* optional max width */
  height: 300px;         /* set desired height */
  overflow: hidden;      /* hide anything outside the div */
  border-radius: 15px;   /* rounded corners */
  box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* subtle shadow */
  margin: 20px auto;     /* center the div horizontally */
}

/* Image styling */
#imagefill img {
  width: 100%;           /* fill width of container */
  height: 100%;          /* fill height of container */
  object-fit: cover;     /* cover container without distortion */
  display: block;        /* remove inline spacing */
  transition: transform 0.3s ease; /* smooth hover effect */
}

/* Optional: zoom effect on hover */
#imagefill img:hover {
  transform: scale(1.05);
}

  </style>
</head>
<body>
  <p>mbjh</p>
  <div id="imagefill">
    <img src="fill.jpeg" alt="DNA banner">
  </div>
</body>
</html>
