<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Uploaded PDFs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    /* Dropdown styling */
    .dropdown {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    #selectedText {
      padding: 10px 20px;
      border: 1px solid #ccc;
      cursor: pointer;
      min-width: 120px;
      display: inline-block;
    }

    .options {
      display: none;
      position: absolute;
      background: #fff;
      border: 1px solid #ccc;
      width: 100%;
      z-index: 10;
    }

    .option {
      padding: 10px;
      cursor: pointer;
    }

    .option:hover {
      background-color: #f0f0f0;
    }

    /* Documents container */
    #documentsContainer {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 600px;
    }

    .doc {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #ccc;
      padding: 10px;
    }

    .doc button {
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Uplloaded Documents</h1>

  <!-- Dropdown for filtering -->
  <div class="dropdown">
    <div id="selectedText" onclick="toggleDropdown()">All</div>
    <div class="options" id="options"></div>
  </div>

  <!-- Container for documents -->
  <div id="documentsContainer">Loading...</div>

  <script>
    const optionsDiv = document.getElementById("options");
    const selectedText = document.getElementById("selectedText");
    const documentsContainer = document.getElementById("documentsContainer");
    let allDocs = [];
    let types = new Set();

    // Toggle dropdown visibility
    function toggleDropdown() {
      optionsDiv.style.display = optionsDiv.style.display === "block" ? "none" : "block";
    }

    // Fetch documents from backend
    async function loadDocuments() {
      try {
        const res = await fetch("/api/documents");
        allDocs = await res.json();

        // Collect unique types
        types = new Set(allDocs.map(d => d.type || "All"));
        types.add("All"); // Always include "All"

        // Generate option divs dynamically
        optionsDiv.innerHTML = "";
        types.forEach(type => {
          const div = document.createElement("div");
          div.className = "option";
          div.dataset.type = type;
          div.textContent = type;

          div.addEventListener("click", () => {
            selectedText.textContent = type;
            optionsDiv.style.display = "none";
            displayDocuments(type);
          });

          optionsDiv.appendChild(div);
        });

        // Display all documents by default
        displayDocuments("All");
      } catch (err) {
        documentsContainer.innerHTML = "<p>Error loading documents.</p>";
        console.error(err);
      }
    }

    // Display documents filtered by type
    function displayDocuments(type) {
      documentsContainer.innerHTML = "";
      const filtered = type === "All" ? allDocs : allDocs.filter(d => d.type === type);

      filtered.forEach(doc => {
        const div = document.createElement("div");
        div.className = "doc";
        div.innerHTML = `
          <span>${doc.name}</span>
          <button onclick="window.open('/api/file/${doc.fileId}', '_blank')">View</button>
        `;
        documentsContainer.appendChild(div);
      });

      if (filtered.length === 0) {
        documentsContainer.innerHTML = "<p>No documents found.</p>";
      }
    }

    // Initial load
    loadDocuments();
  </script>

</body>
</html>
