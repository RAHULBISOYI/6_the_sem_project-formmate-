  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
  <!-- Navigation -->

     <a href="/navbar/contact.html">Contact</a>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">

 
<div class="card-wrapper">
  <!-- USER CARD -->
 <div class="card card-big user-card" id="uploadCard">
  <h3>Upload your document</h3>
</div>
<div class="upload-box" id="uploadDiv">
  <p>Upload your document</p>

  <form id="uploadForm">
    <!-- Document name input -->
    <input
      type="text"
      name="name"
      class="doc-input"
      placeholder="Enter document name"
      required
    />

    <!-- File upload area -->
    <div class="drop-area" id="dropArea">
      <div class="plus">+</div>
      <p id="fileText">Drop PDF</p>

      <button type="button" class="browse-btn" id="browseBtn">
        Open File
      </button>

      <input
        type="file"
        id="fileInput"
        name="file"
        accept="application/pdf"
        hidden
        required
      />
    </div>

    <button type="submit" class="upload-btn">Upload</button>
  </form>
</div>


<script>
  document.getElementById("uploadCard").addEventListener("click", function () {
    document.getElementById("uploadDiv").style.display = "block";
  });
</script>
<script>
  document.getElementById("browseBtn").addEventListener("click", function () {
    document.getElementById("fileInput").click();
  });
</script>
